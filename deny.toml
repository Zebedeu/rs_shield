[advisories]
yanked = "warn"
unmaintained = "transitive"
unsound = "none"
ignore = [
    "RUSTSEC-2021-0119",
    "RUSTSEC-2020-0168",
    "RUSTSEC-2024-0384",
    "RUSTSEC-2024-0388",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0371",
    "RUSTSEC-2024-0372",
    "RUSTSEC-2024-0373",
    "RUSTSEC-2024-0374",
    "RUSTSEC-2024-0375",
    "RUSTSEC-2024-0376",

]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "ISC",
    "Zlib",
    "OpenSSL",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",                  
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]