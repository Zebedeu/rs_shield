# =====================
# ADVISORIES
# =====================
[advisories]
yanked = "warn"

[advisories.vulnerability]
severity = "deny"

[advisories.unmaintained]
scope = "all"

[advisories.unsound]
scope = "all"

# =====================
# LICENSES
# =====================
[licenses]
confidence-threshold = 0.8

[licenses.allow]
licenses = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]

[licenses.deny]
licenses = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]

[licenses.unlicensed]
deny = true

# =====================
# BANS
# =====================
[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "allow"

[[bans.deny]]
name = "openssl"

# =====================
# SOURCES
# =====================
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]