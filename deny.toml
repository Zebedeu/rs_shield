[advisories]
vulnerability = "deny"
unmaintained = "all"
unsound = "all"
yanked = "warn"

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]

[licenses.unlicensed]
deny = true

[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "allow"

[[bans.deny]]
name = "openssl"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]